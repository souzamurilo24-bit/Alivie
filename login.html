<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Entrar na conta" />
    <title>Entrar — Alivie</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script type="module" src="./theme.js"></script>
  </head>
  <body class="page-auth">
    <header class="site-header">
      <div class="container">
        <a class="logo" href="./index.html">Alivie</a>
        <nav class="nav" aria-label="Principal">
          <ul class="nav-links">
            <li><a href="./index.html#inicio">Início</a></li>
            <li><a href="./index.html#sobre">Sobre</a></li>
            <li><a href="./comece-agora.html">Comece agora</a></li>
          </ul>
          <div class="nav-auth" id="nav-auth"></div>
        </nav>
      </div>
    </header>

    <main class="auth-main">
      <div class="auth-card">
        <h1 class="auth-title">Entrar</h1>
        <p class="auth-sub">Use seu e-mail e senha para acessar.</p>

        <p id="login-notice" class="auth-notice" hidden>
          Cadastro concluído. Faça login com sua conta.
        </p>

        <form id="login-form" class="auth-form" novalidate>
          <div class="field">
            <label for="email">E-mail</label>
            <input
              type="email"
              id="email"
              name="email"
              required
              autocomplete="username"
              inputmode="email"
            />
          </div>
          <div class="field">
            <label for="password">Senha</label>
            <input
              type="password"
              id="password"
              name="password"
              required
              minlength="6"
              autocomplete="current-password"
            />
          </div>
          <p id="login-error" class="form-error" role="alert" hidden></p>
          <button type="submit" class="btn btn-primary btn-block">Entrar</button>
        </form>

        <p class="auth-switch">
          Não tem conta? <a href="./signup.html">Criar conta</a>
        </p>
      </div>
    </main>

    <footer class="site-footer">
      <div class="container">
        <p>&copy; <span id="year"></span> Alivie</p>
      </div>
    </footer>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
      import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-analytics.js";
      const firebaseConfig = {
        apiKey: "AIzaSyB-5M4PBd-t3nNtp6bMkRnKT2TJDKfCC3k",
        authDomain: "alivie-project.firebaseapp.com",
        projectId: "alivie-project",
        storageBucket: "alivie-project.firebasestorage.app",
        messagingSenderId: "263866194556",
        appId: "1:263866194556:web:6f1e05e43ec173aa0c87f9",
        measurementId: "G-QRY40YC97E"
      };
      const app = initializeApp(firebaseConfig);
      const analytics = getAnalytics(app);
    </script>
    <script type="module" src="./auth.js"></script>
    <script>
      document.getElementById("year").textContent = new Date().getFullYear();
    </script>
  </body>
</html>
