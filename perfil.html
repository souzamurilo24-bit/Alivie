<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil do Usuário - Alivie</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script type="module" src="theme.js"></script>
</head>
<body class="page-perfil">
    <header class="site-header">
      <div class="container">
        <a class="logo" href="index.html">Alivie</a>
        <nav class="nav" aria-label="Principal">
          <ul class="nav-links">
            <li><a href="index.html">Início</a></li>
            <li><a href="perfil.html" aria-current="page">Perfil</a></li>
            <li><a href="minha-rotina.html">Minha Rotina</a></li>
          </ul>
          <div class="nav-auth" id="nav-auth"></div>
        </nav>
      </div>
    </header>

    <main class="profile-main">
        <div class="container">
            <h1>Bem-vindo ao seu perfil, <span id="profile-name">Carlos</span></h1>
            <div class="profile-card">
                <div class="avatar-section">
                    <div class="avatar-circle">
                        <i class="fas fa-user"></i>
                    </div>
                    <button class="btn btn-primary btn-change-avatar">
                        <i class="fas fa-camera"></i> Alterar Foto de Perfil
                    </button>
                </div>

                <div class="profile-form">
                    <div class="form-section">
                        <h2>Informações Pessoais</h2>
                        <div class="form-group">
                            <label for="full-name">
                                <i class="fas fa-user"></i> Nome Completo
                            </label>
                            <input type="text" id="full-name" value="Carlos Silva" placeholder="Seu nome completo">
                        </div>
                        <div class="form-group">
                            <label for="username">
                                <i class="fas fa-at"></i> Nome de Usuário
                            </label>
                            <input type="text" id="username" value="@carlos_silva" placeholder="@seu_usuario">
                        </div>
                        <div class="form-group">
                            <label for="email">
                                <i class="fas fa-envelope"></i> E-mail
                            </label>
                            <input type="email" id="email" value="teste123@gmail.com" placeholder="seu@email.com" readonly>
                        </div>
                    </div>

                    <div class="form-section">
                        <h2>Configurações da Rotina</h2>
                        <div class="form-group">
                            <label for="routine-focus">
                                <i class="fas fa-bullseye"></i> Foco da Rotina
                            </label>
                            <select id="routine-focus">
                                <option value="relaxamento" selected>Relaxamento</option>
                                <option value="produtividade">Produtividade</option>
                                <option value="bem-estar-fisico">Bem-estar Físico</option>
                                <option value="sono-melhorado">Sono Melhorado</option>
                                <option value="reducao-ansiedade">Redução de Ansiedade</option>
                                <option value="autoconhecimento">Autoconhecimento</option>
                                <option value="energia-vitalidade">Energia e Vitalidade</option>
                                <option value="equilibrio-emocional">Equilíbrio Emocional</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="site-theme">
                                <i class="fas fa-palette"></i> Tema do Site
                            </label>
                            <div class="theme-toggle">
                                <span class="theme-label">Claro</span>
                                <div class="toggle-switch">
                                    <input type="checkbox" id="theme-toggle">
                                    <span class="toggle-slider"></span>
                                </div>
                                <span class="theme-label">Escuro</span>
                            </div>
                        </div>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-save"></i> Salvar Alterações
                        </button>
                        <a href="#" class="btn btn-ghost">
                            <i class="fas fa-times"></i> Cancelar
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="site-footer">
        <div class="container">
            <p>&copy; 2024 Alivie - Seu caminho para bem-estar mental</p>
        </div>
    </footer>

      import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
      import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-analytics.js";
      const firebaseConfig = {
        apiKey: "AIzaSyB-5M4PBd-t3nNtp6bMkRnKT2TJDKfCC3k",
        authDomain: "alivie-project.firebaseapp.com",
        projectId: "alivie-project",
        storageBucket: "alivie-project.firebasestorage.app",
        messagingSenderId: "263866194556",
        appId: "1:263866194556:web:6f1e05e43ec173aa0c87f9",
        measurementId: "G-QRY40YC97E"
      };
      const app = initializeApp(firebaseConfig);
      const analytics = getAnalytics(app);
    </script>
    <script type="module" src="auth.js"></script>
    <script type="module" src="perfil.js"></script>
</body>
</html>
